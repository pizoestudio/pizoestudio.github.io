<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pizoestudio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;font-family:'DM Sans',sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.box{width:100%;max-width:340px;}
.logo{width:66px;height:66px;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(201,169,110,.25);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto 14px;}
.logo img{width:52px;height:52px;object-fit:contain;}
h1{font-family:'Cormorant',serif;font-size:24px;text-align:center;font-weight:300;letter-spacing:.08em;margin-bottom:3px;}
.sub{font-size:8px;text-transform:uppercase;letter-spacing:.2em;color:#C9A96E;text-align:center;margin-bottom:20px;}
.card{background:#1A1A28;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:1.5rem;}
label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3);display:block;margin-bottom:5px;}
input{
  width:100%;padding:12px 13px;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;font-size:15px;
  font-family:'DM Sans',sans-serif;
  color:#fff;background:rgba(255,255,255,.06);
  outline:none;margin-bottom:12px;
  -webkit-appearance:none;
}
input:focus{border-color:rgba(201,169,110,.6);}
input::placeholder{color:rgba(255,255,255,.2);}
.btn{
  width:100%;padding:14px;
  background:#C9A96E;color:#000;
  border:none;border-radius:8px;
  font-size:13px;font-family:'DM Sans',sans-serif;
  font-weight:500;letter-spacing:.06em;
  text-transform:uppercase;cursor:pointer;
  -webkit-appearance:none;
  display:block;
  touch-action:manipulation;
  margin-top:4px;
}
.btn:active{background:#DFC08A;}
.err{
  color:#E07060;font-size:11px;
  background:rgba(224,112,96,.1);
  border:1px solid rgba(224,112,96,.2);
  border-radius:6px;padding:8px 10px;
  text-align:center;margin-bottom:10px;
  display:none;
}
.hint{font-size:10px;color:rgba(255,255,255,.25);text-align:center;margin-top:12px;line-height:1.6;}
.hint b{color:#C9A96E;}
</style>
</head>

  <h1>Pizoestudio</h1>
  <div class="sub">Plataforma Interna · Bogotá</div>
  <div class="card">
    <div class="err" id="err"></div>
    <label>Usuario</label>
    <input id="u" type="text" placeholder="Ej: juanesilva"
      autocomplete="username" autocorrect="off"
      autocapitalize="off" spellcheck="false"/>
    <label>Contraseña</label>
    <input id="p" type="password" placeholder="Tu contraseña"
      autocomplete="current-password"/>
    <button class="btn" id="btn" onclick="login()">Entrar</button>
    <div class="hint">Solicita tu usuario a <b>Luis Carlos</b></div>
  </div>
</div>

<script>
var USERS = {"luiscani\u00f1o": "htujjlr11", "juanesilva": "h85a7k8", "julianaprieto": "h7xtezc12", "davidguzman": "hnvekog14"};
var NAMES = {"luiscani\u00f1o": "Luis Carlos Ni\u00f1o", "juanesilva": "Juan Esteban Silva", "julianaprieto": "Juliana Prieto", "davidguzman": "David Guzm\u00e1n"};
var BROKERS = {"luiscani\u00f1o": "Luis Carlos", "juanesilva": "Juan Esteban", "julianaprieto": "Juliana", "davidguzman": "David"};

function hp(p) {
  var h = 0;
  for (var i = 0; i < p.length; i++) {
    h = ((h << 5) - h) + p.charCodeAt(i);
    h |= 0;
  }
  return 'h' + Math.abs(h).toString(36) + p.length;
}

function login() {
  var u = document.getElementById('u').value.trim().toLowerCase();
  var p = document.getElementById('p').value;
  var err = document.getElementById('err');
  err.style.display = 'none';

  if (!u || !p) {
    err.textContent = 'Escribe usuario y contraseña.';
    err.style.display = 'block';
    return;
  }

  var hash = hp(p);
  var stored = USERS[u];

  console.log('u:', u, 'hash:', hash, 'stored:', stored);

  if (!stored || stored !== hash) {
    err.textContent = 'Usuario o contraseña incorrectos.';
    err.style.display = 'block';
    return;
  }

  // Save session
  var sess = JSON.stringify({u:u, name:NAMES[u], broker:BROKERS[u]});
  localStorage.setItem('pizo_sess', sess);
  sessionStorage.setItem('pizo_sess', sess);

  // Redirect to app
  window.location.href = 'app.html';
}

document.getElementById('p').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});

// Check existing session
try {
  var s = sessionStorage.getItem('pizo_sess') || localStorage.getItem('pizo_sess');
  if (s) window.location.href = 'app.html';
} catch(e) {}
</script>
